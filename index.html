<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Surprise For You 🎉</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/landing.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div class="hearts-background"></div>
  
  <div class="landing-container fade-in">
    <div class="romantic-card">
      <div class="sparkle"></div>
      <h1 class="romantic-title">Happy Birthday, Sakina 🎂</h1>
      <p class="romantic-subtitle">This Day Is All Yours</p>
      <div class="heart-divider">🎈</div>
      
      <!-- Birthday Question -->
      <div class="question-section">
        <h2 class="birthday-question">Ready for your birthday surprise? 🎁</h2>
        <div class="button-container">
          <button class="yes-button" onclick="startSurprise()">
            <span>YES! 🎉</span>
          </button>
          <button class="no-button" id="noButton">
            <span>Not Yet 😄</span>
          </button>
        </div>
        <p class="hint-text">Tap yes to start the celebration ✨</p>
      </div>
    </div>
  </div>

  <script src="js/effects.js"></script>
  <script src="js/landing.js"></script>
  <script src="js/music.js"></script>
</body>
</html>
